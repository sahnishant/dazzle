name: Launch Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync generated content
        run: npm run sync:content

      - name: Build site
        run: npm run build

      - name: Check launch readiness
        run: npm run check:launch

      - name: Check product media
        run: npm run check:product-media

      - name: Check generated content drift
        run: npm run check:generated-content

      - name: Check whitespace
        run: git diff --check
